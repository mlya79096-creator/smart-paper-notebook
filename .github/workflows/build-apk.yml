name: Build APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.12.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm check

      - name: Lint code
        run: pnpm lint || true

      - name: Setup Expo CLI
        run: npm install -g eas-cli

      - name: Authenticate with EAS
        run: eas whoami || echo "Not authenticated"

      - name: Build APK for preview
        env:
          EAS_NO_VCS_DETECTION: 1
        run: |
          eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --wait

      - name: Get build artifacts
        id: build_artifacts
        run: |
          # This would typically get the APK URL from EAS
          echo "APK build completed"

      - name: Create Release
        uses: actions/create-release@v1
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release v${{ github.run_number }}
          body: |
            Automated build from commit ${{ github.sha }}
            
            Build Date: ${{ github.event.head_commit.timestamp }}
            
            This release includes the latest APK build.
          draft: false
          prerelease: false

      - name: Upload APK to Release
        uses: actions/upload-release-asset@v1
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./app-release.apk
          asset_name: smart-paper-notebook-v${{ github.run_number }}.apk
          asset_content_type: application/vnd.android.package-archive

      - name: Build Summary
        run: |
          echo "✅ Build completed successfully"
          echo "Platform: Android (APK)"
          echo "Profile: preview"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref }}"
